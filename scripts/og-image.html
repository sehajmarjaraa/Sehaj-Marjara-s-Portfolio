<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #1d6f42;
    display: flex; align-items: center; justify-content: center;
  }
  .window {
    width: 1080px; height: 540px; background: #fff; border-radius: 10px;
    box-shadow: 0 24px 60px rgba(0,0,0,.4); overflow: hidden;
    display: flex; flex-direction: column;
  }
  .titlebar {
    background: #222; height: 44px; display: flex; align-items: center; padding: 0 16px; gap: 8px;
    color: #eee; font-size: 15px; position: relative;
  }
  .dot { width: 13px; height: 13px; border-radius: 50%; }
  .filename {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px; font-weight: 500;
  }
  .logo { width: 18px; height: 18px; background: #217346; border-radius: 4px; color: #fff;
    font-weight: 800; font-size: 12px; display: flex; align-items: center; justify-content: center; }
  .ribbon {
    background: #2b2b2b; height: 40px; display: flex; align-items: center; padding: 0 14px; gap: 4px;
    color: #ccc; font-size: 13.5px;
  }
  .tab { padding: 8px 12px; }
  .tab.active { color: #fff; font-weight: 600; border-bottom: 2.5px solid #2e8555; background: #3a3a3a; border-radius: 4px 4px 0 0; }
  .fxbar { background: #2b2b2b; border-top: 1px solid rgba(0,0,0,.4); height: 30px; display: flex; align-items: center; color: #cfe8d9; font-size: 13px; }
  .refbox { width: 70px; text-align: center; background: #3a3a3a; border-right: 1px solid #111; line-height: 30px; height: 30px; color: #eee; font-weight: 600; }
  .fx { width: 36px; text-align: center; font-style: italic; font-family: Georgia, serif; color: #999; }
  .formula { font-family: "SF Mono", Menlo, monospace; padding-left: 8px; }
  .grid { flex: 1; display: grid; grid-template-columns: 44px repeat(6, 1fr); grid-auto-rows: 52px; font-size: 14px; color: #555; }
  .hdr { background: #f5f5f5; border-right: 1px solid #d4d4d4; border-bottom: 1px solid #d4d4d4;
    display: flex; align-items: center; justify-content: center; color: #888; font-size: 12.5px; }
  .hdr.sel { background: #d3e8db; color: #217346; font-weight: 700; }
  .cell { border-right: 1px solid #e3e3e3; border-bottom: 1px solid #e3e3e3; display: flex; align-items: center; padding: 0 14px; }
  .a1 {
    outline: 3px solid #217346; outline-offset: -2px; position: relative;
    font-size: 30px; font-weight: 800; color: #111; white-space: nowrap; overflow: visible; z-index: 2;
  }
  .a1::after { content: ""; position: absolute; right: -5px; bottom: -5px; width: 10px; height: 10px;
    background: #217346; border: 2px solid #fff; }
  .sub { color: #1d6f42; font-weight: 600; font-size: 17px; }
  .muted { color: #777; font-size: 15px; }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span class="dot" style="background:#ff5f57"></span>
      <span class="dot" style="background:#febc2e"></span>
      <span class="dot" style="background:#28c840"></span>
      <span class="filename"><span class="logo">X</span> Sehaj_Marjara_Portfolio.xlsx</span>
    </div>
    <div class="ribbon">
      <span class="tab active">About Me</span><span class="tab">Experience</span><span class="tab">Projects</span>
      <span class="tab">Leadership</span><span class="tab">Skills</span><span class="tab">Contact</span>
    </div>
    <div class="fxbar">
      <span class="refbox">A1</span><span class="fx">fx</span>
      <span class="formula">=HIRE(IF(candidate="Sehaj", "Yes", "Also Yes"))</span>
    </div>
    <div class="grid">
      <div class="hdr"></div>
      <div class="hdr sel">A</div><div class="hdr">B</div><div class="hdr">C</div>
      <div class="hdr">D</div><div class="hdr">E</div><div class="hdr">F</div>

      <div class="hdr sel">1</div>
      <div class="cell a1" style="grid-column: span 4;">Sehaj Marjara</div>
      <div class="cell" style="grid-column: span 2;"></div>

      <div class="hdr">2</div>
      <div class="cell sub" style="grid-column: span 4;">Finance · MSU Broad College · May 2026</div>
      <div class="cell" style="grid-column: span 2;"></div>

      <div class="hdr">3</div>
      <div class="cell muted" style="grid-column: span 4;">KPMG · HP Tech Ventures · $500K+ budget · 6 AI finance projects</div>
      <div class="cell" style="grid-column: span 2;"></div>

      <div class="hdr">4</div>
      <div class="cell" style="grid-column: span 6;"></div>

      <div class="hdr">5</div>
      <div class="cell" style="grid-column: span 6;"></div>

      <div class="hdr">6</div>
      <div class="cell" style="grid-column: span 6;"></div>
    </div>
  </div>
</body>
</html>
